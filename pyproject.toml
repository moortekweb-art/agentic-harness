[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-harness"
version = "0.1.0"
description = "A local-first goal execution harness with deterministic review gates."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Moortekweb" }]
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8"]

[project.scripts]
agentic-harness = "agentic_harness.cli:main"

[tool.setuptools.packages.find]
include = ["agentic_harness*"]
