name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run lint
        run: python -m ruff check

      - name: Run typecheck
        run: python -m mypy agentic_harness

      - name: Run compile smoke
        run: python -m compileall agentic_harness

      - name: Build package
        run: |
          python -m pip install build
          python -m build
          python -m twine check dist/*

      - name: Install built wheel
        shell: python
        run: |
          import glob
          import os
          import subprocess
          import shutil
          import tempfile
          import venv

          venv_dir = os.path.join(tempfile.gettempdir(), "agentic-harness-wheel")
          venv.EnvBuilder(with_pip=True, clear=True).create(venv_dir)
          python_bin = os.path.join(
              venv_dir,
              "Scripts" if os.name == "nt" else "bin",
              "python.exe" if os.name == "nt" else "python",
          )
          wheels = glob.glob("dist/*.whl")
          if len(wheels) != 1:
              raise SystemExit(f"expected one built wheel, found {wheels!r}")
          subprocess.check_call([python_bin, "-m", "pip", "install", wheels[0]])
          subprocess.check_call([python_bin, "-m", "agentic_harness.cli", "--help"])
          subprocess.check_call([python_bin, "-m", "agentic_harness.cli", "--version"])
          subprocess.check_call([python_bin, "-m", "agentic_harness.cli", "version"])
          subprocess.check_call([python_bin, "-m", "agentic_harness.cli", "recipes"])
          subprocess.check_call([python_bin, "-m", "agentic_harness.cli", "lint-fix", "--explain"])
          subprocess.check_call([python_bin, "-m", "agentic_harness.cli", "typecheck-fix", "--explain"])
          subprocess.check_call([python_bin, "-m", "agentic_harness.cli", "update-docs", "--explain"])
          subprocess.check_call([python_bin, "-m", "agentic_harness.cli", "changelog", "--explain"])
          subprocess.check_call([python_bin, "-m", "agentic_harness.cli", "verify-tests", "--explain"])
          subprocess.check_call([
              python_bin,
              "-c",
              (
                  "from agentic_harness.core.recipes import load_recipe, recipe_names; "
                  "names = recipe_names(); "
                  "assert 'fix-tests' in names and 'changelog' in names; "
                  "assert load_recipe('fix-tests').review_command"
              ),
          ])
          demo_dir = os.path.join(tempfile.gettempdir(), "agentic-harness-wheel-demo")
          if os.path.exists(demo_dir):
              shutil.rmtree(demo_dir)
          env = os.environ.copy()
          env["PATH"] = os.path.dirname(python_bin) + os.pathsep + env.get("PATH", "")
          subprocess.check_call(
              [
                  python_bin,
                  "-m",
                  "agentic_harness.cli",
                  "run-demo",
                  "fix-tests",
                  demo_dir,
              ],
              env=env,
          )
          transcripts = glob.glob(os.path.join(demo_dir, ".agentic-harness", "runs", "*", "shell-worker.log"))
          if len(transcripts) != 1:
              raise SystemExit(f"expected one shell worker transcript, found {transcripts!r}")
          reports = glob.glob(os.path.join(demo_dir, ".agentic-harness", "runs", "*", "report.md"))
          if len(reports) != 1:
              raise SystemExit(f"expected one markdown report, found {reports!r}")
          with open(os.path.join(demo_dir, "requirements-dev.txt"), encoding="utf-8") as handle:
              if "pytest>=8" not in handle.read():
                  raise SystemExit("generated demo is missing pytest requirement")
          demo_python = os.path.join(
              demo_dir,
              ".venv",
              "Scripts" if os.name == "nt" else "bin",
              "python.exe" if os.name == "nt" else "python",
          )
          subprocess.check_call([demo_python, "-m", "pytest", "tests/", "-q"], cwd=demo_dir, env=env)

      - name: Run CLI smoke checks
        shell: python
        run: |
          import subprocess
          import sys
          import tempfile

          project_dir = tempfile.mkdtemp(prefix="agentic-harness-ci-smoke-")
          subprocess.check_call([sys.executable, "-m", "agentic_harness.cli", "--help"])
          subprocess.check_call(
              [sys.executable, "-m", "agentic_harness.cli", "--project-dir", project_dir, "init"]
          )
          subprocess.check_call(
              [sys.executable, "-m", "agentic_harness.cli", "--project-dir", project_dir, "doctor"]
          )
