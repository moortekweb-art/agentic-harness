name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run CLI smoke checks
        run: |
          python -m agentic_harness.cli --help
          python -m agentic_harness.cli --project-dir /tmp/agentic-harness-ci-smoke init
          python -m agentic_harness.cli --project-dir /tmp/agentic-harness-ci-smoke doctor

