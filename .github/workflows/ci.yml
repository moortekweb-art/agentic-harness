name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run lint
        run: python -m ruff check

      - name: Run typecheck
        run: python -m mypy agentic_harness

      - name: Run compile smoke
        run: python -m compileall agentic_harness

      - name: Build package
        run: |
          python -m pip install build
          python -m build

      - name: Install built wheel
        run: |
          python -m venv /tmp/agentic-harness-wheel
          /tmp/agentic-harness-wheel/bin/python -m pip install dist/*.whl
          /tmp/agentic-harness-wheel/bin/python -m agentic_harness.cli --help

      - name: Run CLI smoke checks
        run: |
          python -m agentic_harness.cli --help
          python -m agentic_harness.cli --project-dir /tmp/agentic-harness-ci-smoke init
          python -m agentic_harness.cli --project-dir /tmp/agentic-harness-ci-smoke doctor
