name: Publish

"on":
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/local-agentic-harness/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and smoke-test distributions
        run: |
          python -m pip install -e ".[test]"
          python -m agentic_harness.cli release-smoke --dist-dir dist

      - name: Prepare PyPI distributions
        run: |
          mkdir -p pypi-dist
          cp dist/*.whl dist/*.tar.gz pypi-dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist/
