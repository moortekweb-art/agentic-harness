version: 1
worker:
  type: coding_agent
  coding_agent_command:
    - python
    - mock_coding_agent.py
    - "{objective}"
  coding_agent_timeout: 30
  coding_agent_transcript: .agentic-harness/runs/{goal_id}/coding-agent.log
review:
  command:
    - python
    - -m
    - pytest
    - tests/
    - -q

